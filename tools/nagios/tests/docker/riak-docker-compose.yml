version: '2.2'
services:
  riak:
    extends:
      file: common.yml
      service: common
    image: khulnasoft/riak-dev:${VERSION:-latest}
    ports:
      - 8098
    networks:
      - riak
  riak-haproxy:
    image: haproxy:alpine
    command: -f /conf/10-global.cfg -f /conf/riak.cfg -d
    ports:
      - 8098
    networks:
      - riak
    volumes:
      - ../../haproxy-configs:/conf:ro

networks:
  riak:
